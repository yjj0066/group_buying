<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>아이돌공구 와이어프레임</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1C1A2E; --mute:#8B889C; --line:#D9D6E8; --bg:#EFEDF5;
  --frame:#fff; --box:#E9E7F0; --box2:#F4F3F8; --pri:#6C4CE0;
}
body{font-family:'Pretendard','Malgun Gothic',-apple-system,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden;height:100vh}

/* 상단바 */
#top{position:fixed;top:0;left:0;right:0;height:48px;background:#fff;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:0 16px;z-index:100}
#top b{font-size:14px}
#top .sub{font-size:11.5px;color:var(--mute)}
#top .sp{flex:1}
.lg{display:flex;gap:10px;font-size:11px;color:#5a5870}
.lg span{display:flex;align-items:center;gap:5px}
.lg i{width:11px;height:11px;border-radius:3px;display:block}
.zc{display:flex;gap:4px}
.zc button{width:28px;height:26px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;font-size:13px;color:#5a5870}
.zc button.w{width:auto;padding:0 9px;font-size:11px}
.zc button:hover{background:#F4F3F8}

/* 사이드 인덱스 */
#side{position:fixed;top:48px;left:0;bottom:0;width:172px;background:#fff;border-right:1px solid var(--line);
  overflow:auto;z-index:99;padding:8px 0 30px}
#side .gh{font-size:10px;font-weight:800;color:#9a97ab;padding:9px 12px 4px;letter-spacing:.4px}
#side a{display:block;padding:4px 12px;font-size:11.5px;color:#4a4860;cursor:pointer;text-decoration:none;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#side a:hover{background:#F4F3F8;color:var(--pri)}
#side a b{font-family:ui-monospace,monospace;font-size:10px;color:#9a97ab;margin-right:5px}
#side a.v{color:#9a97ab;font-style:italic}

/* 캔버스 */
#vp{position:fixed;top:48px;left:172px;right:0;bottom:0;overflow:hidden;cursor:grab}
#vp.drag{cursor:grabbing}
#cv{position:absolute;transform-origin:0 0;width:7200px;height:4000px}
#svg{position:absolute;top:0;left:0;width:7200px;height:4000px;pointer-events:none;z-index:1}
.lane{position:absolute;border:1px dashed #CFCADF;border-radius:14px;background:rgba(255,255,255,.35)}
.lane b{position:absolute;top:-11px;left:16px;background:var(--bg);padding:0 8px;font-size:11.5px;color:#7c7994;letter-spacing:.3px}

/* 프레임 */
.fr{position:absolute;width:380px;background:var(--frame);border:1px solid var(--line);border-radius:10px;z-index:2;
  box-shadow:0 1px 3px rgba(28,26,46,.05)}
.fr.var{border-style:dashed;border-color:#C9C4DC}
.fr .cap{position:absolute;top:-19px;left:2px;font-size:11px;color:#6b6880;white-space:nowrap;display:flex;align-items:center;gap:5px}
.fr .cap i{font-family:ui-monospace,monospace;font-weight:700;font-style:normal;font-size:10px;padding:1px 4px;border-radius:3px}
.fr .cap em{font-style:normal;font-weight:700}
.fr .cap s{text-decoration:none;font-size:9px;color:#9a97ab;border:1px solid #E0DDEA;border-radius:3px;padding:0 3px}
.fr .body{padding:12px}
.fr.hi{outline:2px solid var(--pri);outline-offset:2px}

/* 와이어프레임 요소 */
.wf{font-size:11px;line-height:1.45}
.wf>*{margin-bottom:7px}
.wf>*:last-child{margin-bottom:0}
.nav{height:26px;background:var(--box);border-radius:4px;display:flex;align-items:center;padding:0 8px;color:var(--mute);font-size:10px}
.tabbar{height:30px;background:var(--box);border-radius:4px;display:flex}
.tabbar div{flex:1;border-right:1px solid #fff;font-size:9px;color:var(--mute);display:flex;align-items:center;justify-content:center}
.tabbar div:last-child{border:0}
.logo{height:44px;background:var(--box);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#9a97ab;font-size:13px}
h4.wh{font-size:11.5px;font-weight:800;color:#3f3d55;margin:9px 0 5px}
p.wp{font-size:10.5px;color:var(--mute)}
.in{height:28px;border:1px solid var(--line);border-radius:5px;display:flex;align-items:center;padding:0 8px;color:#a9a6b8;font-size:10.5px;background:#FCFCFE}
.ta{height:52px;border:1px solid var(--line);border-radius:5px;padding:6px 8px;color:#a9a6b8;font-size:10.5px;background:#FCFCFE}
.btn{height:28px;border:1px solid var(--line);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10.5px;color:#5a5870;background:#F8F7FB}
.btn.pri{background:var(--pri);border-color:var(--pri);color:#fff;font-weight:700}
.btn.sm{height:22px;font-size:9.5px;width:88px}
.cta{height:34px;border-radius:6px;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.cta.off{background:#DFDCEA;color:#9a97ab}
.divider{height:1px;background:var(--line);margin:9px 0}
.chip{display:flex;gap:5px;flex-wrap:wrap}
.chip span{border:1px solid var(--line);border-radius:11px;padding:2px 8px;font-size:9.5px;color:#5a5870;background:#fff}
.links{display:flex;gap:10px;justify-content:center;font-size:10px;color:#7b78a0}
.links span{text-decoration:underline}
.note{font-size:9.5px;color:#9a97ab;background:#F7F6FB;border-left:2px solid #D9D6E8;padding:4px 7px;white-space:pre-line}
.info{font-size:10px;color:#1e4f9c;background:#EDF4FF;border:1px solid #CFE0FA;border-radius:5px;padding:6px 8px;white-space:pre-line}
.warn{font-size:10px;color:#8a5a00;background:#FFF8E8;border:1px solid #F0E2C2;border-radius:5px;padding:6px 8px;white-space:pre-line}
.warnBox{font-size:10px;color:#791F1F;background:#FDF0F0;border:1px solid #F3D2D2;border-radius:5px;padding:6px 8px;white-space:pre-line;font-weight:600}
.err{font-size:10px;color:#C42A57;background:#FFF0F4;border:1px solid #F7D3DF;border-radius:5px;padding:5px 8px}
.alert{font-size:10.5px;color:#C42A57;background:#FFF0F4;border:1px solid #F7D3DF;border-radius:5px;padding:6px 8px;font-weight:700}
.banner{height:26px;background:#F3F1F6;border:1px solid var(--line);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10.5px;color:#7c7994;font-weight:700}
.empty{text-align:center;color:var(--mute);font-size:11px;padding:16px 0;background:var(--box2);border-radius:6px}
.empty2{text-align:center;color:#b8b5c6;font-size:9.5px;padding:8px 0;border:1px dashed var(--line);border-radius:5px}
.ok{text-align:center;font-size:13px;font-weight:800;color:#0B6E53;padding:12px 0;background:#EAF8F3;border-radius:6px}
.blank{}
.img{background:var(--box2);border:1px dashed var(--line);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#b8b5c6;font-size:10px}
.card{height:52px;background:var(--box2);border:1px solid var(--line);border-radius:5px}
.cards{display:flex;gap:6px}
.cards div{flex:1;height:56px;background:var(--box2);border:1px solid var(--line);border-radius:5px}
.kpi{display:flex;gap:5px}
.kpi div{flex:1;height:40px;background:var(--box2);border:1px solid var(--line);border-radius:5px;font-size:9px;color:#5a5870;display:flex;align-items:center;justify-content:center;text-align:center}
.kv{display:flex;flex-direction:column;gap:3px}
.kv div{display:flex;justify-content:space-between;font-size:10.5px;padding:2px 0;border-bottom:1px dotted #E8E6F0}
.kv div span:first-child{color:var(--mute)}
.kv div span:last-child{font-weight:600}
.tabs{display:flex;border-bottom:1px solid var(--line)}
.tabs div{padding:5px 10px;font-size:10.5px;color:var(--mute)}
.tabs div:first-child{color:var(--pri);font-weight:700;border-bottom:2px solid var(--pri)}
.steps{display:flex;gap:4px;align-items:center;margin-bottom:8px}
.steps div{flex:1;height:18px;background:var(--box);border-radius:9px;font-size:8.5px;color:var(--mute);display:flex;align-items:center;justify-content:center}
.steps div.on{background:var(--pri);color:#fff;font-weight:700}
.time{display:flex;gap:2px;align-items:center}
.time div{flex:1;text-align:center;font-size:8px;color:var(--mute)}
.time div i{display:block;height:5px;background:var(--box);border-radius:3px;margin-bottom:3px}
.time div.on i{background:var(--pri)}
.time div.on{color:var(--pri);font-weight:800}
.time div.done i{background:#B9AAF0}
.check{display:flex;flex-direction:column;gap:4px}
.check div{display:flex;align-items:center;gap:6px;font-size:10.5px;color:#5a5870}
.check div i{width:12px;height:12px;border:1px solid var(--line);border-radius:3px;display:block}
.sw{display:flex;flex-direction:column;gap:6px}
.sw div{display:flex;justify-content:space-between;align-items:center;font-size:10.5px;padding:4px 0;border-bottom:1px solid #F0EEF6}
.sw div i{width:28px;height:16px;background:var(--pri);border-radius:9px;display:block}
.toggle{display:flex;background:var(--box);border-radius:6px;padding:2px}
.toggle div{flex:1;text-align:center;font-size:10px;padding:4px;border-radius:4px;color:var(--mute)}
.toggle div:first-child{background:#fff;color:var(--ink);font-weight:700}
.row2{display:flex;gap:6px}
.row2 div{flex:1;height:44px;border:1px solid var(--line);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10.5px;color:#5a5870}
.opt{display:flex;flex-direction:column;gap:5px}
.opt div{border:1px solid var(--line);border-radius:5px;padding:7px 9px;font-size:10.5px;color:#5a5870}
.menu{display:flex;flex-direction:column}
.menu div{padding:8px 2px;font-size:11px;border-bottom:1px solid #F0EEF6;color:#4a4860;display:flex;justify-content:space-between}
.menu div:after{content:'›';color:#c9c6d6}
.tbl{border:1px solid var(--line);border-radius:5px;overflow:hidden}
.tbl .hd{display:flex;background:var(--box);font-size:9px;color:#5a5870;font-weight:700}
.tbl .hd div{flex:1;padding:4px 5px;border-right:1px solid #fff}
.tbl .rw{display:flex;border-top:1px solid #F0EEF6}
.tbl .rw div{flex:1;padding:5px;border-right:1px solid #F4F3F8}
.tbl .rw div i{display:block;height:7px;background:var(--box2);border-radius:2px}
.rhead{font-size:12px;font-weight:800;color:#3f3d55;background:#F7F6FB;border-left:3px solid var(--pri);padding:7px 9px;border-radius:0 5px 5px 0}
.hl{background:#F3EFFF;border:1px solid #DDD2FA;border-radius:5px;padding:7px 9px;font-size:10.5px;color:#432a86;font-weight:700}
.seats{display:flex;flex-direction:column;gap:4px}
.seats div{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line);border-radius:5px;padding:5px 8px;font-size:10.5px}
.seats div.full{background:#F6F5F9;color:#b8b5c6}
.seats div.hold{background:#FFF8E8;border-color:#F0E2C2;color:#8a5a00}
.seats div em{font-style:normal;font-size:9px;padding:1px 5px;border-radius:3px;background:var(--box);color:#5a5870}
.seats div.free em{background:#E1F5EE;color:#0B6E53}
.trust{border:1px solid var(--line);border-radius:6px;padding:8px;background:#FAFAFD}
.trust .t1{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:800;margin-bottom:5px}
.trust .t1 em{font-style:normal;background:#E1F5EE;color:#0B6E53;font-size:9px;padding:1px 5px;border-radius:3px}
.trust .t2{font-size:9.5px;color:var(--mute);line-height:1.6}
.lock{background:var(--box2);border:1px dashed var(--line);border-radius:5px;padding:10px;text-align:center;font-size:10px;color:#b8b5c6}
.acct{background:#F3EFFF;border:1px solid #DDD2FA;border-radius:6px;padding:10px;text-align:center}
.acct .a1{font-size:9.5px;color:#7b78a0}
.acct .a2{font-family:ui-monospace,monospace;font-size:13px;font-weight:800;color:#432a86;margin:3px 0}
.acct .a3{font-size:11px;font-weight:800;color:var(--ink)}
.timer{background:#FFF8E8;border:1px solid #F0E2C2;border-radius:5px;padding:5px 8px;font-size:10px;color:#8a5a00;text-align:center;font-weight:700}
.wait{background:var(--box2);border-radius:5px;padding:12px;text-align:center;font-size:10.5px;color:var(--mute)}
.upload{border:2px dashed var(--line);border-radius:6px;padding:16px 8px;text-align:center;font-size:10px;color:#a9a6b8;background:#FCFCFE;white-space:pre-line}
.extract{border:1px solid #CFE0FA;background:#F7FBFF;border-radius:6px;padding:8px}
.extract .e{display:flex;justify-content:space-between;font-size:10px;padding:3px 0;border-bottom:1px dotted #DCE8F8}
.extract .e span:last-child{font-weight:700}
.extract .e.low{background:#FFF8E8;margin:0 -4px;padding:3px 4px;border-radius:3px}
.extract .e.low em{font-style:normal;font-size:8px;color:#8a5a00;border:1px solid #E8D5A8;border-radius:3px;padding:0 3px;margin-left:4px}
.vf{display:flex;flex-direction:column;gap:3px}
.vf div{display:flex;align-items:center;gap:5px;font-size:10px;padding:3px 6px;border-radius:4px;background:#EAF8F3;color:#0B6E53}
.vf div.no{background:#FDF0F0;color:#C42A57}
.vf div b{font-size:9px;margin-left:auto;font-weight:600;opacity:.75}
.mask{display:flex;gap:6px;align-items:center}
.mask .m1{flex:1;height:56px;background:var(--box2);border:1px solid var(--line);border-radius:5px;position:relative;font-size:9px;color:#b8b5c6;display:flex;align-items:center;justify-content:center}
.mask .m1 u{position:absolute;background:#3f3d55;border-radius:2px;text-decoration:none}
.stepper{display:flex;flex-direction:column;gap:4px}
.stepper div{display:flex;align-items:center;justify-content:space-between;font-size:10.5px;padding:4px 6px;border:1px solid var(--line);border-radius:5px}
.stepper div i{display:flex;gap:4px;align-items:center;font-size:9px;color:var(--mute)}
.stepper div i b{width:18px;height:18px;border:1px solid var(--line);border-radius:4px;display:flex;align-items:center;justify-content:center;color:#5a5870}
.cmp{border:1px solid var(--line);border-radius:5px;overflow:hidden}
.cmp .r{display:flex;font-size:10px;border-top:1px solid #F0EEF6}
.cmp .r:first-child{border:0;background:var(--box);font-weight:700;font-size:9px}
.cmp .r div{flex:1;padding:4px 6px;text-align:center}
.cmp .r.no{background:#FDF0F0;color:#C42A57;font-weight:700}
.ship{border:1px solid var(--line);border-radius:5px;overflow:hidden;font-size:9.5px}
.ship .r{display:flex;border-top:1px solid #F0EEF6;align-items:center}
.ship .r:first-child{border:0;background:var(--box);font-weight:700;font-size:9px}
.ship .r div{flex:1;padding:4px 5px}
.ship .r em{font-style:normal;font-size:8.5px;padding:1px 4px;border-radius:3px;background:#E1F5EE;color:#0B6E53}
.ship .r.q em{background:#FFF8E8;color:#8a5a00}
.cf{border:1px solid #F0E2C2;background:#FFFBEF;border-radius:6px;padding:8px;margin-bottom:7px}
.cf .c1{font-size:10px;font-weight:700;color:#8a5a00;margin-bottom:4px}
.cf .c2{font-size:9.5px;color:#5a5870;line-height:1.6;margin-bottom:6px}
.cf .c3{display:flex;gap:5px}
.cf .c3 span{flex:1;border:1px solid var(--line);background:#fff;border-radius:4px;padding:4px;text-align:center;font-size:9.5px;color:#5a5870}
.cf .c3 span:first-child{background:var(--pri);color:#fff;border-color:var(--pri);font-weight:700}
.profile{display:flex;gap:10px;align-items:center;padding:6px 0}
.profile i{width:44px;height:44px;border-radius:50%;background:var(--box);display:block}
.profile div{flex:1}
.profile .p1{font-size:12px;font-weight:800}
.profile .p2{font-size:9.5px;color:var(--mute);margin-top:2px}
.score{text-align:center;background:#FAFAFD;border:1px solid var(--line);border-radius:8px;padding:12px}
.score .s1{font-size:24px;font-weight:800;color:var(--pri)}
.score .s2{font-size:10px;color:var(--mute);margin-top:2px}
.bars{display:flex;flex-direction:column;gap:5px}
.bars div{display:flex;align-items:center;gap:6px;font-size:9.5px;color:#5a5870}
.bars div i{flex:1;height:8px;background:var(--box);border-radius:4px;position:relative;overflow:hidden}
.bars div i u{position:absolute;left:0;top:0;bottom:0;background:var(--pri);text-decoration:none}
.bars div i u.r{background:#E24B4A}
.rvw{border:1px solid var(--line);border-radius:5px;padding:7px;font-size:9.5px;color:#5a5870}
.rvw b{display:block;color:#E0A93C;margin-bottom:3px}
.gb{border:1px solid var(--line);border-radius:6px;padding:8px;background:#fff}
.gb .g1{display:flex;gap:7px}
.gb .g1 i{width:48px;height:48px;background:var(--box2);border:1px solid var(--line);border-radius:4px;display:block}
.gb .g1 div{flex:1}
.gb .t{font-size:10.5px;font-weight:700;margin-bottom:4px}
.gb .m{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px}
.gb .m span{font-size:8px;padding:1px 4px;border-radius:3px;background:#E1F5EE;color:#0B6E53}
.gb .m span.x{background:#F0EEF6;color:#b8b5c6;text-decoration:line-through}
.gb .b{display:flex;justify-content:space-between;font-size:9px;color:var(--mute);margin-top:5px;padding-top:5px;border-top:1px solid #F4F3F8}
.gb .b em{font-style:normal;background:#F3EFFF;color:#432a86;padding:1px 4px;border-radius:3px;font-weight:700}
.gbrow{border:1px solid var(--line);border-radius:5px;padding:7px 9px;font-size:10.5px;color:#4a4860}
.jn{border:1px solid var(--line);border-radius:6px;padding:8px}
.jn.hl{border-color:#F7D3DF;background:#FFFBFC}
.jn .j1{font-size:10.5px;font-weight:700;margin-bottom:4px}
.jn .j2{font-size:9.5px;color:var(--mute)}
.stars{text-align:center;font-size:22px;color:#E0A93C;letter-spacing:3px}
.modal{background:var(--box);border-radius:6px 6px 0 0;margin:-12px -12px 10px;padding:9px 12px;font-size:11.5px;font-weight:800;display:flex;justify-content:space-between}
.modal:after{content:'✕';color:var(--mute);font-weight:400}
.proof{border:1px solid #CFE0FA;background:#F7FBFF;border-radius:6px;padding:8px}
.proof .p1{display:flex;justify-content:space-between;font-size:9.5px;padding:2px 0}
.proof .p1 span:first-child{color:var(--mute)}
.proof .ok{background:#EAF8F3;color:#0B6E53;font-size:9px;font-weight:700;border-radius:4px;padding:3px 6px;margin-top:5px;text-align:center}
.proof .src{font-size:8.5px;color:#7b78a0;margin-top:4px;text-align:right}
.opn{border:1px solid var(--line);border-radius:6px;padding:8px}
.opn .o1{display:flex;gap:4px;margin-bottom:6px}
.opn .o1 span{flex:1;background:var(--box2);border-radius:4px;padding:4px 2px;text-align:center;font-size:8.5px;color:#5a5870}
.opn .o2{height:40px;background:var(--box2);border:1px dashed var(--line);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#b8b5c6;margin-bottom:5px}
.opn .o3{font-size:10px;text-align:center;font-weight:700;color:#0B6E53;background:#EAF8F3;border-radius:4px;padding:4px}
</style>
</head>
<body>

<div id="top">
  <b>아이돌공구 · 웹 와이어프레임</b>
  <span class="sub">40 프레임 (기본 34 + 상태 6) · 화면정의서 v3 기준</span>
  <span class="sp"></span>
  <span class="lg" id="lg"></span>
  <span class="zc">
    <button onclick="zoom(-1)">−</button>
    <button onclick="zoom(1)">+</button>
    <button class="w" onclick="fit()">전체 보기</button>
    <button class="w" id="fb" onclick="toggleFlow()">흐름선 ON</button>
  </span>
</div>

<div id="side"></div>

<div id="vp">
  <div id="cv">
    <svg id="svg"></svg>
  </div>
</div>

<script>
// 화면 데이터 (화면정의서 v3 기준)

});

SCREENS.forEach(s=>{
  const g = G[s.g];
  const d = document.createElement('div');

/* 범례 */
document.getElementById('lg').innerHTML = Object.values(G).map(g=>
  `<span><i style="background:${g.bg};border:1px solid ${g.fg}33"></i>${g.name}</span>`).join('')

const side = document.getElementById('side');

SCREENS.forEach(s=>{
  if(s.g !== curG){ curG=s.g;
    const h=document.createElement('div'); h.className='gh'; h.textContent=G[s.g].name; side.appendChild(h); }

/* ══ 흐름선 ══ */
const NS='http://www.w3.org/2000/svg';
function mk(t,a){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
const defs = mk('defs');
[['ah','#8B7FD4'],['ah2','#C0BBD6']].forEach(([id,c])=>{
  const m = mk('marker',{id,markerWidth:8,markerHeight:8,refX:7,refY:3,orient:'auto'});
  m.appendChild(mk('path',{d:'M0,0 L7,3 L0,6 Z',fill:c})); defs.appendChild(m);
});
svg.appendChild(defs);

function drawFlows(){
  [...svg.querySelectorAll('g')].forEach(g=>g.remove());
  const g = mk('g'); svg.appendChild(g);
  FLOWS.forEach(([a,b,label,dotted])=>{
    const A = document.getElementById('fr-'+a), B = document.getElementById('fr-'+b);
    if(!A||!B) return;
    const ax=A.offsetLeft, ay=A.offsetTop, aw=A.offsetWidth, ah=A.offsetHeight;
    const bx=B.offsetLeft, by=B.offsetTop, bw=B.offsetWidth, bh=B.offsetHeight;
    let x1,y1,x2,y2,c1,c2;
    if(bx > ax+aw-40){ x1=ax+aw; y1=ay+Math.min(ah/2,120); x2=bx; y2=by+Math.min(bh/2,120);
      const d=Math.max(28,(x2-x1)*0.4); c1=`${x1+d},${y1}`; c2=`${x2-d},${y2}`; }
    else if(bx+bw < ax+40){ x1=ax; y1=ay+Math.min(ah/2,120); x2=bx+bw; y2=by+Math.min(bh/2,120);
      const d=Math.max(28,(x1-x2)*0.4); c1=`${x1-d},${y1}`; c2=`${x2+d},${y2}`; }
    else { x1=ax+aw/2; y1=(by>ay)?ay+ah:ay; x2=bx+bw/2; y2=(by>ay)?by:by+bh;
      const d=Math.max(30,Math.abs(y2-y1)*0.4); c1=`${x1},${y1+(by>ay?d:-d)}`; c2=`${x2},${y2-(by>ay?d:-d)}`; }
    const col = dotted?'#C0BBD6':'#8B7FD4';
    g.appendChild(mk('path',{d:`M${x1},${y1} C${c1} ${c2} ${x2},${y2}`,fill:'none',stroke:col,
      'stroke-width':dotted?1.2:1.6,'stroke-dasharray':dotted?'5,4':'none','marker-end':`url(#${dotted?'ah2':'ah'})`,opacity:.9}));
    if(label){
      const mx=(x1+x2)/2, my=(y1+y2)/2 - 6;
      const t = mk('text',{x:mx,y:my,'text-anchor':'middle','font-size':10,fill:dotted?'#9a97ab':'#6B5FB8','font-weight':600,'font-family':'Malgun Gothic,sans-serif'});
      t.textContent = label;
      const r = mk('rect',{x:mx-label.length*5.2-4,y:my-10,width:label.length*10.4+8,height:14,rx:3,fill:'#EFEDF5',opacity:.95});
      g.appendChild(r); g.appendChild(t);
    }
  });
}
setTimeout(drawFlows, 60);

let showFlow = true;
function toggleFlow(){ showFlow=!showFlow; svg.style.display=showFlow?'block':'none';
  document.getElementById('fb').textContent = '흐름선 '+(showFlow?'ON':'OFF'); }

/* ══ 팬 & 줌 ══ */
const vp = document.getElementById('vp');
let sc=1, tx=40, ty=40, dragging=false, sx, sy;
function apply(){ cv.style.transform = `translate(${tx}px,${ty}px) scale(${sc})`; }
vp.addEventListener('mousedown', e=>{ if(e.button!==0) return; dragging=true; vp.classList.add('drag'); sx=e.clientX-tx; sy=e.clientY-ty; });
addEventListener('mousemove', e=>{ if(!dragging) return; tx=e.clientX-sx; ty=e.clientY-sy; apply(); });
addEventListener('mouseup', ()=>{ dragging=false; vp.classList.remove('drag'); });
vp.addEventListener('wheel', e=>{ e.preventDefault();
  const r=vp.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  const ns = Math.min(2.2, Math.max(0.06, sc * (e.deltaY<0?1.12:0.89)));
  tx = mx - (mx-tx)*(ns/sc); ty = my - (my-ty)*(ns/sc); sc=ns; apply();
}, {passive:false});
function zoom(d){ const r=vp.getBoundingClientRect(), mx=r.width/2, my=r.height/2;
  const ns=Math.min(2.2,Math.max(0.06, sc*(d>0?1.25:0.8)));
  tx=mx-(mx-tx)*(ns/sc); ty=my-(my-ty)*(ns/sc); sc=ns; apply(); }
function fit(){ const r=vp.getBoundingClientRect();
  sc = Math.min(r.width/6700, r.height/3900) * 0.94; tx=30; ty=30; apply(); }
function center(id){
  const el=document.getElementById('fr-'+id); if(!el) return;
  document.querySelectorAll('.fr.hi').forEach(x=>x.classList.remove('hi'));
  el.classList.add('hi');
  const r=vp.getBoundingClientRect(); sc=0.95;
  tx = r.width/2 - (el.offsetLeft+190)*sc; ty = 90 - el.offsetTop*sc; apply();
}
apply(); setTimeout(fit, 100);
</script>
