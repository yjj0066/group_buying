<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1200" viewBox="0 0 960 1200" fill="none" role="img" aria-label="Concert venue">
  <defs>
    <linearGradient id="sky" x1="480" y1="0" x2="480" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E1033"/>
      <stop offset="0.45" stop-color="#4C1D95"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="stageGlow" x1="480" y1="760" x2="480" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EC4899" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6B46E5" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(480 220) rotate(90) scale(420 520)">
      <stop stop-color="#F9A8D4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#F9A8D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beamPink" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F472B6" stop-opacity="0.45"/>
