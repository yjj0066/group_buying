    </linearGradient>
    <linearGradient id="beamPurple" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="960" height="1200" fill="url(#sky)"/>
